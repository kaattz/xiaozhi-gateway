services:
  xiaozhi-gateway:
    build: .
    container_name: xiaozhi-gateway
    restart: unless-stopped
    ports:
      - "8125:8125"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./config:/app/config:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8125/health', timeout=2).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
