name: Xiaozhi Gateway
version: "0.1.16"
slug: xiaozhi_gateway
description: Xiaozhi Home Assistant gateway
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
ports:
  8125/tcp: 8125
map:
  - type: addon_config
    read_only: false
options:
  addon_version: "0.1.16"
  announcement_enabled: true
  announcement_provider: doubao
  doubao_app_id: ""
  doubao_access_key: ""
  doubao_resource_id: seed-tts-2.0
  doubao_voice: zh_female_xiaohe_uranus_bigtts
  doubao_sample_rate: 16000
  doubao_speech_speed: 正常
  devices:
    - key: living_room_xiaozhi
      device_id: "aa:bb:cc:dd:ee:ff"
      client_id: livingroom_xiaozhi
      room_id: living_room
      room_name: 客厅
      ha_area_id: living_room
      ha_device_id: ""
      wake_group: public_area
      priority: 0
      mic_gain_offset_db: 0.0
schema:
  addon_version: str
  announcement_enabled: bool
  announcement_provider: str
  doubao_app_id: str
  doubao_access_key: password?
  doubao_resource_id: str
  doubao_voice: str
  doubao_sample_rate: int
  doubao_speech_speed: list(正常|慢速|快速)
  devices:
    - key: str
      device_id: str
      client_id: str?
      room_id: str
      room_name: str
      ha_area_id: str
      ha_device_id: str?
      wake_group: str?
      priority: int?
      mic_gain_offset_db: float?
