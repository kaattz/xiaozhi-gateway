name: Xiaozhi Gateway
version: "0.1.5"
slug: xiaozhi_gateway
description: Xiaozhi Home Assistant gateway
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
ports:
  8125/tcp: 8125
map:
  - type: addon_config
    read_only: false
options:
  addon_version: "0.1.5"
  announcement_enabled: true
  announcement_provider: doubao
  doubao_api_key: ""
  doubao_model: doubao-tts
  doubao_voice: zh_female_kailangjiejie_moon_bigtts
  doubao_sample_rate: 16000
  devices:
    - key: living_room_xiaozhi
      device_id: "aa:bb:cc:dd:ee:ff"
      client_id: livingroom_xiaozhi
      room_id: living_room
      room_name: 客厅
      ha_area_id: living_room
      ha_device_id: ""
schema:
  addon_version: str
  announcement_enabled: bool
  announcement_provider: str
  doubao_api_key: password?
  doubao_model: str
  doubao_voice: str
  doubao_sample_rate: int
  devices:
    - key: str
      device_id: str
      client_id: str?
      room_id: str
      room_name: str
      ha_area_id: str
      ha_device_id: str?
